services:
  seapedia:
    build: .
    container_name: seapedia
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      JWT_SECRET: ${JWT_SECRET}
      TOKEN_EXPIRES_IN: ${TOKEN_EXPIRES_IN:-6h}
    volumes:
      - ./data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seapedia.rule=Host(`${SEAPEDIA_HOST}`)"
      - "traefik.http.routers.seapedia.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.services.seapedia.loadbalancer.server.port=${PORT:-3000}"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK}
